<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add New Program</title>
    <link rel="stylesheet" href="FRU10/style.css">
    <script>
        function validateForm() {
            const code = document.forms["programForm"]["programCode"].value;
            const name = document.forms["programForm"]["programName"].value;
            const duration = document.forms["programForm"]["duration"].value;
            if (code === "" || name === "" || duration === "") {
                alert("All fields must be filled out");
                return false;
            }
            if (isNaN(duration) || duration <= 0) {
                alert("Duration must be a positive number");
                return false;
            }
            return true;
        }
    </script>
</head>
<body>
    <h2>Add New Program</h2>
    <form name="programForm" action="add-new-program.php" method="POST" onsubmit="return validateForm();">
        <label for="programCode">Program Code:</label>
        <input type="text" id="programCode" name="programCode">

        <label for="programName">Program Name:</label>
        <input type="text" id="programName" name="programName">

        <label for="duration">Duration (Years):</label>
        <input type="text" id="duration" name="duration">

        <input type="submit" value="Submit">
    </form>
</body>
</html>
